<!DOCTYPE html>
<html>
<head>
    <title>Data Mapper</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow rounded" style="max-width: 700px;">
        <h5 class="mb-3">Align Spreadsheet Headers</h5>
        <p class="small text-muted">Match your CSV columns to the database fields below.</p>
        <form action="/execute_import" method="POST">
            <table class="table table-sm mt-3">
                <thead><tr><th>Database Field</th><th>Your Header (Row 2)</th></tr></thead>
                <tbody>
                    {% for key, label in fields %}
                    <tr>
                        <td><strong>{{label}}</strong></td>
                        <td>
                            <select name="{{key}}" class="form-select form-select-sm">
                                <option value="">-- Ignore / Skip --</option>
                                {% for h in headers %}
                                <option value="{{h}}">{{h}}</option>
                                {% endfor %}
                            </select>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button type="submit" class="btn btn-success w-100 mt-3 fw-bold">COMMIT IMPORT</button>
            <a href="/settings" class="btn btn-link w-100 text-secondary mt-2">Cancel</a>
        </form>
    </div>
</body>
</html>
