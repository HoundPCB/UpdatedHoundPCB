<!DOCTYPE html>
<html>
<head>
    <title>Tech Metrics</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5 bg-light">
    <div class="container bg-white p-4 shadow rounded">
        <a href="/" class="btn btn-outline-secondary mb-3">← Back to Entry</a>
        <h3>Technician Performance Metrics</h3>
        <hr>
        <table class="table table-bordered table-striped mt-4">
            <thead class="table-dark">
                <tr>
                    <th>Technician</th>
                    <th>Total Calls</th>
                    <th>Service Calls</th>
                    <th>Avg Duration</th>
                </tr>
            </thead>
            <tbody>
                {% for s in stats %}
                <tr>
                    <td><strong>{{ s.tech }}</strong></td>
                    <td>{{ s.total }}</td>
                    <td><span class="badge bg-info text-dark">{{ s.service }}</span></td>
                    <td>{{ s.avg }} min</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
