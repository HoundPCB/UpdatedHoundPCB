<!DOCTYPE html>
<html>
<head>
    <title>Call Submitted Successfully</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .success-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        .side-image {
            flex: 1;
            max-width: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .side-image img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .success-card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            max-width: 600px;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .success-header {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }
        .success-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .success-header h2 {
            font-weight: 700;
            margin-bottom: 5px;
        }
        .success-header p {
            opacity: 0.9;
            margin: 0;
        }
        .details-section {
            padding: 30px;
            border-bottom: 1px solid #e9ecef;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.95rem;
        }
        .detail-label {
            font-weight: 600;
            color: #5a5c69;
        }
        .detail-value {
            color: #2c3e50;
            text-align: right;
            max-width: 50%;
            word-break: break-word;
        }
        .action-buttons {
            padding: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn-primary {
            background: #4e73df;
            border: none;
            flex: 1;
        }
        .btn-primary:hover {
            background: #2e59d9;
            color: white;
        }
        .btn-secondary {
            flex: 1;
        }
        .auto-redirect {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="side-image">
            <img src="/static/dora-the-explorer-waving-6x3h264vrhdg2zjc.png" alt="Left decoration" onerror="this.style.display='none'">
        </div>
        
        <div class="success-card">
            <div class="success-header">
                <div></div>
                <h2>Call Record Saved!</h2>
                <p>Your support call has been successfully submitted to the database.</p>
            </div>

            <div class="details-section">
                <h6 class="text-muted text-uppercase mb-3" style="font-size: 0.75rem;">Summary</h6>
                
                <div class="detail-row">
                    <span class="detail-label">Customer:</span>
                    <span class="detail-value">{{ customer }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date:</span>
                    <span class="detail-value">{{ date }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Duration:</span>
                    <span class="detail-value">{{ duration }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Issue:</span>
                    <span class="detail-value">{{ issue }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Technician:</span>
                    <span class="detail-value"><span class="badge bg-info text-dark">{{ tech }}</span></span>
                </div>
            </div>

            <div class="action-buttons">
                <a href="/" class="btn btn-primary">Add Another Call</a>
                <a href="/history" class="btn btn-secondary">View History</a>
            </div>

            <div class="auto-redirect">
                Redirecting to entry form in <span id="countdown">300</span> seconds...
            </div>
        </div>
        
        <div class="side-image">
            <img src="/static/456-4565272_thumb-image-boots-dora-hd-png-download.png" alt="Right decoration" onerror="this.style.display='none'">
        </div>
    </div>

    <script>
        let seconds = 300;
        const countdownElement = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
