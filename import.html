<!DOCTYPE html>
<html>
<head>
    <title>Import Data</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-5 bg-light">
    <div class="container bg-white p-5 shadow rounded">
        <h3>Bulk Import Monthly CSV</h3>
        <p>Select your monthly CSV export to populate the database.</p>
        <form action="/import" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" class="form-control mb-3" accept=".csv" required>
            <button type="submit" class="btn btn-danger">Execute Import</button>
            <a href="/" class="btn btn-link">Cancel</a>
        </form>
    </div>
</body>
</html>
